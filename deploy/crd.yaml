apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tunnelingresses.cloudflare.onit.systems
spec:
  group: cloudflare.onit.systems
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [hostname, service]
              properties:
                hostname:
                  type: string
                  description: Public domain (e.g., app.example.com)
                service:
                  type: string
                  description: Backend URL (e.g., http://svc.ns.svc.cluster.local:80)
                access:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    bypassPublicIP:
                      type: boolean
                    additionalBypassIPs:
                      type: array
                      items:
                        type: string
                dns:
                  type: object
                  properties:
                    proxied:
                      type: boolean
            status:
              type: object
              properties:
                ready:
                  type: boolean
                tunnelConfigured:
                  type: boolean
                dnsConfigured:
                  type: boolean
                accessConfigured:
                  type: boolean
                publicIP:
                  type: string
                lastSyncTime:
                  type: string
                message:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Hostname
          type: string
          jsonPath: .spec.hostname
        - name: Service
          type: string
          jsonPath: .spec.service
        - name: Access
          type: boolean
          jsonPath: .spec.access.enabled
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: Public IP
          type: string
          jsonPath: .status.publicIP
  scope: Namespaced
  names:
    plural: tunnelingresses
    singular: tunnelingress
    kind: TunnelIngress
    shortNames:
      - ti
